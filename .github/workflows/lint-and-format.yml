name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Run Linting
        if: always()
        run: npm run lint

      - name: Annotate Failures
        if: failure()
        run: |
          echo "::error title=Code Quality Issue::Linting or formatting issues found. Please run 'npm run lint:fix' and 'npm run format' to resolve them."
