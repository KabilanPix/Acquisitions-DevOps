services:
  app:
    build:
      context: .
      target: development
    command: npm run dev
    env_file:
      - .env.development
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - neon-local
    restart: unless-stopped

  neon-local:
    image: neondatabase/neon_local:latest
    env_file:
      - .env.development
    ports:
      - '5432:5432'
    restart: unless-stopped

volumes:
  node_modules:
